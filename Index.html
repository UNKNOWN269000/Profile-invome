<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Aluminium | Profile Income</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0d0f14;
            --bg-card: #161b22;
            --bg-inner: #0d1117;
            --accent-green: #4ade80;
            --text-main: #ffffff;
            --text-muted: #9aa0a6;
            --border-color: #30363d;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #090b0f; color: var(--text-main); line-height: 1.6; padding-bottom: 100px; overflow-x: hidden; width: 100%; }

        /* HEADER */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--bg-dark); display: flex; align-items: center; padding: 0 20px;
            border-bottom: 1px solid var(--border-color); z-index: 2000; backdrop-filter: blur(10px);
        }
        .menu-btn { background: transparent; border: none; color: #fff; cursor: pointer; font-size: 24px; margin-right: 15px; }
        .company-name { font-size: 1.1rem; font-weight: 700; color: var(--accent-green); letter-spacing: 1px; }

        /* SIDE MENU */
        .side-menu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--bg-dark); border-right: 1px solid var(--border-color);
            padding: 90px 15px 20px; transition: var(--transition); z-index: 1500;
        }
        .side-menu.active { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; z-index: 1400; }
        .overlay.active { display: block; }

        /* MENU ITEMS */
        .menu-item {
            color: white; text-decoration: none; display: flex; align-items: center; 
            gap: 10px; padding: 15px; cursor: pointer; transition: 0.2s; border-radius: 10px;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item.active-link { color: var(--accent-green); background: rgba(74, 222, 128, 0.1); }
        
        .dropdown-container { display: flex; flex-direction: column; }
        .dropdown-content { 
            display: none; flex-direction: column; padding-left: 35px; 
            background: rgba(0,0,0,0.2); border-radius: 0 0 10px 10px;
        }
        .dropdown-content.show { display: flex; }
        .sub-menu-item {
            color: var(--text-muted); text-decoration: none; padding: 12px;
            font-size: 0.9rem; transition: 0.2s; display: block;
        }
        .sub-menu-item:hover { color: var(--accent-green); }
        .sub-menu-item.active-sub { color: var(--accent-green); font-weight: 600; }
        .chevron-icon { transition: transform 0.3s; }
        .chevron-icon.rotate { transform: rotate(180deg); }

        /* MAIN UI */
        .container { padding: 90px 15px 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .page-header { text-align: center; margin-bottom: 25px; width: 100%; }
        .page-header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .page-header h3 { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .card {
            width: 100%; max-width: 850px; background: var(--bg-card);
            border-radius: 24px; border: 1px solid var(--border-color);
            padding: 20px; display: flex; flex-direction: column; gap: 20px;
            min-height: 200px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .inner-frame {
            width: 100%; min-height: 100px; background: var(--bg-inner);
            border-radius: 15px; border: 1px dashed #444c56; padding: 12px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .data-entry {
            background: #1c2128; border-radius: 12px; padding: 15px;
            border-left: 5px solid #38bdf8; position: relative;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .data-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; font-size: 0.85rem;
        }
        .data-item b { display: block; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 2px; }
        .data-item span { color: white; font-weight: 500; }

        /* MODALS */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 500px; background: var(--bg-card);
            border: 1px solid var(--border-color); border-radius: 20px;
            padding: 25px; z-index: 3000; display: none; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        .modal.active { display: block; animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { transform: translate(-50%, -45%) scale(0.9); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* FORM STYLES */
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .form-group input {
            padding: 12px; background: var(--bg-inner); border: 1px solid var(--border-color);
            border-radius: 8px; color: white; outline: none; transition: 0.2s; font-size: 16px;
        }
        .form-group input:focus { border-color: #38bdf8; }
        .form-group input:read-only { background: rgba(255,255,255,0.05); color: #38bdf8; border-style: dashed; }

        .modal-footer { margin-top: 25px; display: flex; gap: 10px; }
        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: #38bdf8; color: #082f49; }
        .btn-cancel { background: #374151; color: white; }

        .add-main-btn {
            background: var(--bg-inner); color: #38bdf8; border: 1px solid #38bdf8;
            padding: 16px; font-size: 1rem; font-weight: 700;
            border-radius: 12px; cursor: pointer; width: 100%;
        }

        /* ACTIONS */
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #ff6b6b; cursor: pointer; padding: 5px; opacity: 0.7; transition: 0.2s; }
        .edit-btn { position: absolute; top: 15px; right: 50px; color: #38bdf8; cursor: pointer; padding: 5px; opacity: 0.7; transition: 0.2s; }
        .delete-btn:hover, .edit-btn:hover { opacity: 1; transform: scale(1.1); }

        .submit-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(13, 15, 20, 0.9); backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color); padding: 20px;
            display: flex; justify-content: center; z-index: 1000;
        }

        .final-submit-btn {
            width: 100%; max-width: 850px;
            background: linear-gradient(135deg, #38bdf8, #0284c7);
            color: white; border: none; padding: 18px; font-size: 1.1rem; font-weight: 800;
            border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        /* SUCCESS ANIMATION OVERLAY */
        .success-overlay {
            position: fixed; inset: 0; background: rgba(9, 11, 15, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5000; text-align: center;
        }
        .success-overlay.active { display: flex; }

        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #38bdf8;
            border-radius: 50%; display: inline-block; box-sizing: border-box;
            animation: rotation 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .checkmark-svg { width: 80px; height: 80px; display: none; }
        .success-overlay.finished .loader { display: none; }
        .success-overlay.finished .checkmark-svg { display: block; }
    </style>
</head>
<body>

<div class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="company-name">ULTRA ALUMINIUM</div>
</div>

<div class="side-menu" id="menu">
    <div style="padding: 10px; color: var(--text-muted); font-size: 0.8rem; font-weight: 800;">MAIN MENU</div>
    <a href="#" class="menu-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    
    <div class="dropdown-container">
        <div class="menu-item dropdown-trigger active-link" onclick="toggleDropdown()">
            <div style="display:flex; align-items:center; gap:10px;">
                <i data-lucide="factory"></i> Production Entry
            </div>
            <i data-lucide="chevron-down" class="chevron-icon" id="chevron"></i>
        </div>
        <div class="dropdown-content show" id="dropdownContent">
            <a href="https://bucketstock.netlify.app/" class="sub-menu-item">• Bucket Income</a>
            <a href="https://profile-income.netlify.app/" class="sub-menu-item active-sub" style="color:var(--accent-green)">• Profile Income</a>
            <a href="https://aging-details.netlify.app/" class="sub-menu-item">• Aging Details</a>
        </div>
    </div>
    <a href="#" class="menu-item"><i data-lucide="database"></i> Records</a>
</div>

<div class="overlay" id="mainOverlay" onclick="closeAll()"></div>

<div class="modal" id="addModal">
    <h3 id="modalTitle" style="margin-bottom:20px;">Add Profile Income</h3>
    <form id="profileForm" onsubmit="event.preventDefault(); saveEntry();">
        <div class="form-group">
            <label>Profile</label>
            <input type="text" id="profileName" required placeholder="Enter profile name">
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="qty" required placeholder="0">
        </div>
        <div class="form-group">
            <label>Input Weight (kg)</label>
            <input type="number" step="0.01" id="inputVal" required oninput="calcYield()" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Output Weight (kg)</label>
            <input type="number" step="0.01" id="outputVal" required oninput="calcYield()" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Yield (%)</label>
            <input type="text" id="yield" readonly placeholder="Calculated automatically">
        </div>
        
        <div class="modal-footer">
            <button type="submit" class="btn btn-save" id="submitBtn">Add Entry</button>
            <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </form>
</div>

<div class="container">
    <div class="page-header">
        <h1>Profile Income</h1>
        <h3>Extrusion Section</h3>
    </div>

    <div class="card">
        <button class="add-main-btn" onclick="openModal()">+ Add Profile Record</button>
        <div class="inner-frame" id="displayArea">
            <div id="noDataText" style="color: var(--text-muted); text-align: center; padding: 20px;">No records added yet.</div>
        </div>
    </div>
</div>

<div class="submit-footer">
    <button class="final-submit-btn" onclick="finalSubmit()">
        <i data-lucide="send"></i> Finalize Profile Submission
    </button>
</div>

<div class="success-overlay" id="successOverlay">
    <span class="loader"></span>
    <svg class="checkmark-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="25" fill="none" stroke="#4ade80" stroke-width="2"/>
        <path fill="none" stroke="#4ade80" stroke-width="4" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
    </svg>
    <h2 id="statusText" style="color: white; margin-top:20px;">Processing Submission...</h2>
</div>

<script>
    lucide.createIcons();
    let sessionData = [];
    let editId = null;

    function toggleMenu() {
        document.getElementById("menu").classList.toggle("active");
        document.getElementById("mainOverlay").classList.toggle("active");
    }

    function toggleDropdown() {
        document.getElementById("dropdownContent").classList.toggle("show");
        document.getElementById("chevron").classList.toggle("rotate");
    }

    function openModal() {
        document.getElementById('profileForm').reset();
        document.getElementById('modalTitle').innerText = "Add Profile Income";
        document.getElementById('submitBtn').innerText = "Add Entry";
        editId = null;
        document.getElementById("addModal").classList.add("active");
        document.getElementById("mainOverlay").classList.add("active");
    }

    function closeModal() {
        document.getElementById("addModal").classList.remove("active");
        if (!document.getElementById("menu").classList.contains("active")) document.getElementById("mainOverlay").classList.remove("active");
    }

    function closeAll() {
        document.getElementById("menu").classList.remove("active");
        closeModal();
    }

    function calcYield() {
        const input = parseFloat(document.getElementById('inputVal').value) || 0;
        const output = parseFloat(document.getElementById('outputVal').value) || 0;
        if(input > 0) {
            const yieldVal = ((output / input) * 100).toFixed(2);
            document.getElementById('yield').value = yieldVal + "%";
        } else {
            document.getElementById('yield').value = "";
        }
    }

    function saveEntry() {
        const formData = {
            id: editId || Date.now(),
            profile: document.getElementById('profileName').value,
            qty: document.getElementById('qty').value,
            input: document.getElementById('inputVal').value,
            output: document.getElementById('outputVal').value,
            yield: document.getElementById('yield').value
        };

        if(editId) {
            const index = sessionData.findIndex(i => i.id === editId);
            sessionData[index] = formData;
        } else {
            sessionData.push(formData);
        }

        renderEntries();
        closeModal();
    }

    function editEntry(id) {
        const item = sessionData.find(i => i.id === id);
        if(!item) return;

        editId = id;
        document.getElementById('modalTitle').innerText = "Edit Profile Entry";
        document.getElementById('submitBtn').innerText = "Update Entry";
        
        document.getElementById('profileName').value = item.profile;
        document.getElementById('qty').value = item.qty;
        document.getElementById('inputVal').value = item.input;
        document.getElementById('outputVal').value = item.output;
        document.getElementById('yield').value = item.yield;

        document.getElementById("addModal").classList.add("active");
        document.getElementById("mainOverlay").classList.add("active");
    }

    function removeEntry(id) {
        if(confirm("Are you sure you want to delete this entry?")) {
            sessionData = sessionData.filter(i => i.id !== id);
            renderEntries();
        }
    }

    function renderEntries() {
        const display = document.getElementById('displayArea');
        display.innerHTML = '';
        if(sessionData.length === 0) {
            display.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">No records added yet.</div>';
            return;
        }
        [...sessionData].reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'data-entry';
            div.innerHTML = `
                <i data-lucide="edit-3" class="edit-btn" onclick="editEntry(${item.id})"></i>
                <i data-lucide="trash-2" class="delete-btn" onclick="removeEntry(${item.id})"></i>
                <div class="data-grid">
                    <div class="data-item"><b>Profile</b><span>${item.profile}</span></div>
                    <div class="data-item"><b>Qty</b><span>${item.qty}</span></div>
                    <div class="data-item"><b>Input (kg)</b><span>${item.input}</span></div>
                    <div class="data-item"><b>Output (kg)</b><span>${item.output}</span></div>
                    <div class="data-item" style="grid-column: span 2; border-top: 1px solid #30363d; padding-top: 10px; margin-top: 5px;">
                        <b style="color:#38bdf8">Calculated Yield</b>
                        <span style="font-size:1.3rem; color:#38bdf8">${item.yield}</span>
                    </div>
                </div>`;
            display.appendChild(div);
        });
        lucide.createIcons();
    }

    function finalSubmit() {
        if(sessionData.length === 0) return alert("Add profile entries before submitting.");
        
        const overlay = document.getElementById('successOverlay');
        const statusText = document.getElementById('statusText');
        
        overlay.classList.add('active');
        
        // Finalize Submit Animation Sequence
        setTimeout(() => {
            overlay.classList.add('finished');
            statusText.innerText = "Data Submitted Successfully";
            statusText.style.color = "#4ade80";
            
            setTimeout(() => {
                location.reload();
            }, 2500);
        }, 2000);
    }
</script>
</body>
</html>
